<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Contacto</title>

    <link rel="stylesheet"
          href="assets/css/styles.css">

</head>

<body>

<div class="container">

    <h1>Contacto</h1>

    <form id="contactForm">

        <input type="text"
               placeholder="Nombre"
               required>

        <input type="email"

               required>

        <textarea
            placeholder="Mensaje"
            required></textarea>

        <button type="submit">

            Enviar

        </button>

    </form>

    <h2>Redes</h2>

    <ul>

        <li>
            LinkedIn:
            linkedin.com/in/daniela
        </li>

        <li>
            GitHub:
            github.com/danielabernales
        </li>

    </ul>

</div>

<script src="assets/js/app.js"></script>

</body>

</html>
